name: Check Campsite Availability

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Restore cooldown state
        uses: actions/cache@v4
        with:
          path: .last_notified
          key: cooldown-${{ github.run_id }}
          restore-keys: cooldown-

      - name: Check availability (loop every 60s for 9 minutes)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          for i in 1 2 3 4 5 6 7 8 9; do
            echo "=== Run $i of 9 at $(date -u) ==="
            node index.js || true
            if [ "$i" -lt 9 ]; then
              sleep 60
            fi
          done

      - name: Save cooldown state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .last_notified
          key: cooldown-${{ github.run_id }}
