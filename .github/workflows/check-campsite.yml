name: Check Campsite Availability

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Check availability
        id: check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          node index.js
          if [ -f .availability_found ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Schedule next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          if [ "${{ steps.check.outputs.found }}" = "true" ]; then
            echo "Availability found — waiting 1 hour before next check"
            sleep 3600
          else
            echo "No availability — waiting 60s before next check"
            sleep 60
          fi
          gh workflow run check-campsite.yml --repo DJKullas/campsite-checker
